name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
env:
  UV_CACHE_DIR: /tmp/.uv-cache

jobs:
  style:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: ./.github/actions/setup-env
        with:
          python-version: '3.11'
      - name: Install dev extras
        run: |
          uv venv
          source .venv/bin/activate
          uv pip install -e ".[dev]"
      - name: Run ruff
        run: |
          source .venv/bin/activate
          ruff check src/amica

  test:
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash
    strategy:
      fail-fast: false
      matrix:
        include:
          # Ubuntu tests against all versions
          - os: [ubuntu-latest]
            python-version: '3.10'
            resolution: 'lowest-direct'
          - os: [ubuntu-latest]
            python-version: '3.11'
            resolution: 'highest'
          - os: [ubuntu-latest]
            python-version: '3.12'
            resolution: 'highest'
          - os: [ubuntu-latest]
            python-version: '3.13'
            resolution: 'highest'
          - os: [ubuntu-latest]
            python-version: '3.14'
            resolution: 'highest'
          # On macOS & Windows just test against selected versions
          - os: [macos-latest]
            python-version: '3.12'
            resolution: 'highest'
          - os: [windows-latest]
            python-version: '3.12'
            resolution: 'highest'

    steps:
      - uses: actions/checkout@v5
      - uses: ./.github/actions/setup-env
        with:
          python-version: ${{ matrix.python-version }}

      - name: Create uv virtual environment
        run: |
          uv venv
          # venv activation dir differs between Windows and *nix
          if [ "$RUNNER_OS" = "Windows" ]; then
            echo "ACTIVATE_DIR=Scripts" >> "$GITHUB_ENV"
          else
            echo "ACTIVATE_DIR=bin" >> "$GITHUB_ENV"
          fi
          echo "UV_RESOLUTION=${{ matrix.resolution }}" >> "$GITHUB_ENV"
      
      - name: Install Base Deps and check import
        run: |
          source .venv/${ACTIVATE_DIR}/activate
          uv pip install --resolution=${UV_RESOLUTION} -e ".[torch-cpu]"
          python -c "import amica"

      - name: Install dev extras
        run: |
          source .venv/${ACTIVATE_DIR}/activate
          uv pip install -e ".[dev]"

      - name: Run tests
        run: |
          source .venv/${ACTIVATE_DIR}/activate
          pytest -m "not sklearn_api"
      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Minimize uv cache
        run: uv cache prune --ci
  
  sklearn-api-tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.14"]

    steps:
      - uses: actions/checkout@v5
      - uses: ./.github/actions/setup-env
        with:
          python-version: ${{ matrix.python-version }}
      # TODO: can we stuff uv venv creation and activation into the setup-env action?
      - name: Create uv virtual environment
        run: |
          uv venv
          source .venv/bin/activate
      - name: Install dev extras
        run: |
          source .venv/bin/activate
          uv pip install -e ".[torch-cpu,dev]"
      - name: Run Scikit-Learn API tests
        run: |
          source .venv/bin/activate
          pytest -m "sklearn_api"
      - name: Minimize uv cache
        run: uv cache prune --ci
